<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA | Initialize Account Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        velora: {
                            bgCream: '#FDFBF7',
                            navyDeep: '#0A1128',
                            navyText: '#1C2541',
                            purpleAccent: '#4A148C',
                            purpleHover: '#320B61',
                            mutedGray: '#6C757D'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDFBF7; color: #1C2541; }
        .luxury-card {
            background: #FFFFFF;
            border: 1px solid rgba(74, 20, 140, 0.08);
            box-shadow: 0 20px 40px rgba(10, 17, 40, 0.04);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between bg-velora-bgCream">

    <!-- Header Navigation -->
    <header class="w-full py-6 px-6 border-b border-purple-900/10 bg-white/60 backdrop-blur-md flex justify-between items-center">
        <a href="index.html" class="text-2xl font-extrabold text-velora-navyDeep tracking-tight">V<span class="text-velora-purpleAccent">e</span>lora</a>
        <a href="index.html" class="text-xs font-semibold text-velora-mutedGray hover:text-velora-purpleAccent transition flex items-center gap-1.5">
            <i class="fas fa-arrow-left text-[10px]"></i> Back to Landing
        </a>
    </header>

    <!-- Main Registration Section -->
    <main class="w-full max-w-md mx-auto px-4 py-12 flex-grow flex flex-col justify-center">
        <div class="luxury-card rounded-3xl p-8">
            <h1 class="text-2xl font-extrabold text-velora-navyDeep mb-2 tracking-tight">Set Up Your Profile</h1>
            <p class="text-xs text-velora-mutedGray mb-6 leading-relaxed">Fill out your profile details below to customize your experience and activate your account parameters.</p>

            <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-5">
                <!-- Username Input -->
                <div>
                    <label class="block text-xs uppercase tracking-wider text-velora-mutedGray font-bold mb-2">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-velora-mutedGray/60 text-xs"></i>
                        <input type="text" id="username" required placeholder="Choose a unique username" class="w-full bg-velora-bgCream border border-purple-900/10 rounded-xl py-3 pl-10 pr-4 text-sm text-velora-navyDeep placeholder-velora-mutedGray/50 focus:outline-none focus:border-velora-purpleAccent focus:ring-1 focus:ring-velora-purpleAccent transition">
                    </div>
                </div>

                <!-- Email Input -->
                <div>
                    <label class="block text-xs uppercase tracking-wider text-velora-mutedGray font-bold mb-2">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-velora-mutedGray/60 text-xs"></i>
                        <input type="email" id="email" required placeholder="example@gmail.com" class="w-full bg-velora-bgCream border border-purple-900/10 rounded-xl py-3 pl-10 pr-4 text-sm text-velora-navyDeep placeholder-velora-mutedGray/50 focus:outline-none focus:border-velora-purpleAccent focus:ring-1 focus:ring-velora-purpleAccent transition">
                    </div>
                </div>

                <!-- Plan Dropdown Selection -->
                <div>
                    <label class="block text-xs uppercase tracking-wider text-velora-mutedGray font-bold mb-2">Select Membership Tier</label>
                    <div class="relative">
                        <i class="fas fa-layer-group absolute left-4 top-1/2 transform -translate-y-1/2 text-velora-mutedGray/60 text-xs"></i>
                        <select id="tierPlan" required class="w-full bg-velora-bgCream border border-purple-900/10 rounded-xl py-3 pl-10 pr-10 text-sm text-velora-navyDeep focus:outline-none focus:border-velora-purpleAccent focus:ring-1 focus:ring-velora-purpleAccent appearance-none transition cursor-pointer">
                            <option value="platinum">Velora Platinum Plan — ₦9,000</option>
                            <option value="gold">Velora Gold Plan — ₦14,500</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-velora-mutedGray/60 text-xs pointer-events-none"></i>
                    </div>
                </div>

                <!-- Form Submit Action Button (Fixed type="submit") -->
                <button type="submit" class="w-full mt-2 bg-velora-purpleAccent hover:bg-velora-purpleHover text-white font-extrabold py-3.5 rounded-xl transition transform active:scale-[0.98] shadow-xl shadow-velora-purpleAccent/10 flex justify-center items-center gap-2">
                    Proceed to Secure Payment <i class="fas fa-lock text-xs"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer Security Banner -->
    <footer class="py-6 text-center text-[10px] text-velora-mutedGray border-t border-purple-900/5 bg-white/40">
        <p class="flex justify-center items-center gap-1.5">
            <i class="fas fa-shield-alt text-velora-mutedGray/80"></i> Data stored securely under protected local session protocols.
        </p>
    </footer>

    <!-- JavaScript Data Vectors -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const planParam = params.get('plan');
            if(planParam) {
                const selectElement = document.getElementById('tierPlan');
                if(planParam.toLowerCase() === 'gold') selectElement.value = 'gold';
                if(planParam.toLowerCase() === 'platinum') selectElement.value = 'platinum';
            }
        });

        // Fixed: Removed the word "factory" which was causing a JavaScript runtime error
        function handleRegistration(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const plan = document.getElementById('tierPlan').value;

            window.location.href = `payment.html?plan=${encodeURIComponent(plan)}&user=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}`;
        }
    </script>
</body>
</html>
